# Overlay for Linux hosts with NVIDIA GPUs. Requires nvidia-container-toolkit.
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
services:
  nf-nhits:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  nf-tsmixerx:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  nf-patchtst:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
  nf-tft:
    deploy:
      resources:   
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
  nf-tide:
    deploy:
      resources:   
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
  nf-lstm:
    deploy:
      resources:   
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]